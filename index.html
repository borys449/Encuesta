<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso - Encuestados ULEAM</title>
    <link rel="stylesheet" href="CSS/Proyecto_Ingreso.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <header class="top-bar">
            <img src="HTML/LOGO-ULEAM.png" alt="Logo ULEAM" class="logo-header">
            <div class="frase-random">
                <transition name="fade" mode="out-in">
                    <span :key="fraseActual" class="frase-universitaria">
                        <i class="fas fa-quote-left"></i>
                        {{ fraseActual }}
                        <i class="fas fa-quote-right"></i>
                    </span>
                </transition>
            </div>
        </header>

        <div class="background-overlay"></div>

        <div class="contenedor-del-login">
            <form class="login" @submit.prevent="validarIngreso">
                <h1>ENCUESTADOS</h1>

                <transition name="bounce">
                    <div v-if="error" class="error-box">
                        <i class="fas fa-exclamation-circle"></i> {{ mensajeError }}
                    </div>
                </transition>

                <div class="ingresos">
                    <i class="fas fa-envelope"></i>
                    <input type="email"
                           v-model="correo"
                           name="email"
                           autocomplete="username"
                           placeholder="Correo institucional"
                           class="login-input"
                           required>
                </div>

                <div class="ingresos">
                    <i class="fas fa-lock"></i>
                    <input :type="verClave ? 'text' : 'password'"
                           v-model="clave"
                           name="password"
                           autocomplete="current-password"
                           placeholder="Contraseña"
                           class="login-input"
                           required>
                    <button type="button" class="toggle-password" @click="verClave = !verClave">
                        <i :class="verClave ? 'far fa-eye-slash' : 'far fa-eye'"></i>
                    </button>
                </div>

                <button type="submit" class="login-button">Ingresar</button>

                <div class="botones-adicionales">
                    <div class="opcion-recordar">
                        <input type="checkbox" v-model="recordar" id="rec">
                        <label for="rec">Recordar sesión</label>
                    </div>
                    <button type="button" class="link-registro" @click="abrirRegistro">Crear cuenta</button>
                </div>
            </form>
        </div> 
        
        <div v-if="mostrarRegistro" class="modal-overlay" @click.self="cerrarRegistro">
            <form class="modal-registro" @submit.prevent="registrarUsuario">
                <h1 class="titulo-registro">ENCUESTADOS</h1>
                <h2 class="subtitulo-registro">Crear Cuenta</h2>

                <div class="ingresos-registro">
                    <input type="text" v-model="nuevoUsuario.nombre" autocomplete="name" placeholder="Nombre completo" class="login-input" required>
                </div>

                <div class="ingresos-registro">
                    <input type="email" v-model="nuevoUsuario.correo" name="new-email" autocomplete="email" placeholder="Correo institucional" class="login-input" required>
                </div>

                <div class="ingresos">
                    <i class="fas fa-lock"></i>
                    <input :type="verClave ? 'text' : 'password'"
                           v-model="nuevoUsuario.clave"
                           name="new-password"
                           autocomplete="new-password"
                           placeholder="Contraseña"
                           class="login-input"
                           required>
                    <button type="button" class="toggle-password" @click="verClave = !verClave">
                        <i :class="verClave ? 'far fa-eye-slash' : 'far fa-eye'"></i>
                    </button>
                </div>

                <div class="ingresos-registro">
                    <input type="password" v-model="nuevoUsuario.repetir_clave" autocomplete="new-password" placeholder="Repetir contraseña" class="login-input" required>
                </div>

                <div class="ingresos-registro">
                    <select v-model="nuevoUsuario.rol" class="ingreso-rol" required>
                        <option value="" disabled>¿Quién eres?</option>
                        <option value="Estudiante">Estudiante (@live.uleam.edu.ec)</option>
                        <option value="Profesor">Profesor (@uleam.edu.ec)</option>
                        <option value="Administrador">Personal Administrativo / Secretaría</option>
                    </select>
                </div>

                <div class="modal-buttons">
                    <button type="submit" class="btn-registrar">Completar Registro</button>
                    <button type="button" class="btn-cancelar" @click="cerrarRegistro">Cancelar</button>
                </div>
            </form>
        </div>

        <div v-if="error && mensajeError.includes('Live Server')" class="aviso-servidor">
            ⚠️ {{ mensajeError }}
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="src/js/core/db.js" defer></script>
    <script src="src/js/views/ingreso.js" defer></script>
</body>
</html>
